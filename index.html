<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Roboto:ital,wght@0,100;0,300;0,400;0,700;1,700&display=swap"
      rel="stylesheet"
    />
    <title>Zen Sup</title>
  </head>
  <body>
    <div class="left">
      <div class="overlay">
        <img src="images/sup-icon.png" alt="An icon" class="icon" />
        <h1>Zen Sup</h1>
      </div>
      <div class="credits">
        Photo by Ivan Rohovchenko on <a href="http://unsplash.com">Unsplash</a>
      </div>
    </div>
    <div class="right">
      <div class="description">
        <h3>
          This is not a real online service! You know you need something like this in your life
          to help you realize your deepest dreams.
          <br />
          Sign up <span>now</span> to get started.
        </h3>
        <h3>
          You
          <span>know</span> you want to.
        </h3>
      </div>
      <div class="form-container"></div>
      Let's do this!
      <form action="" method="post">
        <label for="first-name">FIRST NAME</label>
        <input type="text" name="first-name" id="first-name" />
        <label for="last-name">LAST NAME</label>
        <input type="text" name="last-name" id="last-name" />
        <label for="e-mail">EMAIL</label>
        <input type="email" name="e-mail" id="e-mail" />
        <label for="phone">PHONE NUMBER</label>
        <input type="tel" name="phone" id="phone" />
        <label for="password">PASSWORD</label>
        <input type="password" name="password" id="password" />
        <label for="confirm-pw">CONFIRM PASSWORD</label>
        <input type="password" name="confirm-pw" id="confirm-pw" />
      </form>
      <div class="button-container">
        <button type="submit">Create Account</button>
        <div class="log-in-text">Already have an account? <a href="">Log in</a></div>
      </div>
    </div>
  </body>
</html>
